      - generic [ref=e86]:
        - generic [ref=e87]:
          - text: Fonctionnalités
          - heading "Un dispositif complet pour le verger industriel professionnel." [level=2] [ref=e88]
        - paragraph [ref=e89]: Tout ce qu'un exploitant exigeant attend d'un outil de traçabilité — cartographie parcelaire, planification des traitements, registres réglementaires et surveillance permanente — dans une seule plateforme cohérente.
      - generic [ref=e90]:
        - generic [ref=e91]:
          - generic [ref=e92]: PILOTAGE
          - img [ref=e94]
          - generic [ref=e97]: 01 · LA CARTE DE L'EXPLOITATION
          - generic [ref=e98]: L'exploitation sous contrôle, d'un seul regard.
          - generic [ref=e99]: Constituez votre parcellaire réglementaire directement sur le terrain. Supervisez chaque passage en temps réel — débit, vitesse, progression. En cas de conditions défavorables, LeadFarm suspend l'opération avant tout incident de traitement.
        - generic [ref=e100]:
          - img [ref=e102]
          - generic [ref=e105]: 02 · MÉMOIRE TOTALE
          - generic [ref=e106]: Un historique inaltérable, opposable en audit.
          - generic [ref=e107]: Chaque modification — surface, variété, dose, opérateur, date — est conservée dans sa version originale. Rien ne peut être effacé ni altéré. L'auditeur consulte exactement la donnée que vous avez produite, sans possibilité de contestation.
        - generic [ref=e108]:
          - img [ref=e110]
          - generic [ref=e112]: 03 · REGISTRES OFFICIELS
          - generic [ref=e113]: Cahier de culture généré à la clôture de chaque intervention.
          - generic [ref=e114]: "L'ordre de traitement réglementaire est édité automatiquement en fin de séance : produit homologué, dose appliquée, opérateur signataire, conditions météorologiques consignées. Prêt pour l'archivage ou la remise au contrôleur."
        - generic [ref=e115]:
          - img [ref=e117]
          - generic [ref=e122]: 04 · SURVEILLANCE EN CONTINU
          - generic [ref=e123]: Les conditions de traitement validées avant chaque passage.
          - generic [ref=e124]: Température, humidité, pluviométrie, vent — les paramètres agro-météorologiques de chaque parcelle sont vérifiés en continu. Planifiez les interventions dans les fenêtres favorables et réduisez le nombre de reprises.
        - generic [ref=e125]:
          - img [ref=e127]
          - generic [ref=e130]: 05 · VEILLE PHYTOSANITAIRE
          - generic [ref=e131]: La pression parasitaire détectée avant l'apparition des symptômes.
          - generic [ref=e132]: L'état sanitaire de vos vergers est évalué chaque semaine par imagerie satellitaire. Une anomalie foliaire photographiée sur le terrain est identifiée en quelques secondes — mildiou, tavelure, oïdium — avant toute propagation.
        - generic [ref=e133]:
          - img [ref=e135]
          - generic [ref=e138]: 06 · SOUVERAINETÉ DES DONNÉES
          - generic [ref=e139]: Vos données restent votre propriété exclusive.
          - generic [ref=e140]: Chaque exploitation dispose de son propre espace cloisonné. Aucune donnée ne transite vers un domaine tiers, aucune analyse agrégée n'est réalisée sans votre accord. Export intégral disponible à tout moment, sans délai.
