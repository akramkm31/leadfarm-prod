  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px;}\na{color:inherit;text-decoration:none}\nbutton{font-family:inherit}\n::selection{background:var(--primary-light)}\n\n/* ── Focus states — cohérents et accessibles ── */\n:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:3px;}\nbutton:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--radius-xs);}\n.tab:focus-visible{outline:2px solid var(--primary);outline-offset:-2px;}\n\n/* ── View transitions — fadeIn + subtle lift ── */\n@keyframes viewIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}\n.view{display:none;}\n.view.active{display:block;animation:viewIn .22s cubic-bezier(.4,0,.2,1);}\n\n/* ───────── Layout shell ───────── */\n.app{display:flex;min-height:100vh;}\n.main{flex:1;min-width:0;display:flex;flex-direction:column;}\n\n/* ───────── Sidebar ───────── */\n.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40;}\n.sb-brand{display:flex;align-items:center;gap:11px;padding:17px 18px 15px;border-bottom:1px solid var(--border-light);}\n.sb-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#22C55E,#16A34A);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(22,163,74,.22);}\n.sb-brand h1{font-size:16px;font-weight:800;letter-spacing:-.3px;line-height:1.15;}\n.sb-brand h1 span{color:var(--accent);}\n.sb-brand .sub{font-size:10px;color:var(--text-muted);font-weight:500;margin-top:2px;letter-spacing:.15px;text-wrap:balance;}\n\n.sb-exploit{margin:10px 12px 2px;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;gap:9px;}\n.sb-exploit .pin{width:28px;height:28px;border-radius:7px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.sb-exploit .nm{font-size:12px;font-weight:700;color:var(--text);line-height:1.2;}\n.sb-exploit .lc{font-size:10px;color:var(--text-muted);margin-top:1px;}\n\n/* Nav — inset box-shadow pour l'indicateur actif (aucun hack layout, ne clipe pas) */\n.sb-nav{flex:1;overflow-y:auto;padding:6px 12px 12px;}\n.sb-group{margin-top:16px;}\n.sb-group:first-child{margin-top:8px;}\n.sb-group-label{\n  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);\n  padding:4px 8px 7px;display:flex;align-items:center;gap:8px;\n}\n.sb-group-label::after{content:'';flex:1;height:1px;background:var(--border-light);display:block;}\n.sb-item{display:flex;align-items:center;gap:10px;padding:7.5px 10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:background .13s,color .13s,box-shadow .13s;position:relative;margin-bottom:2px;}\n.sb-item:hover{background:var(--bg);color:var(--text);}\n/* Inset left-border indicator — ne nécessite aucun changement de layout */\n.sb-item.active{background:var(--primary-light);color:var(--primary-dark);font-weight:700;box-shadow:inset 3px 0 0 var(--primary);}\n.sb-item.active svg{stroke:var(--primary);}\n.sb-item svg{width:17px;height:17px;flex-shrink:0;stroke:var(--text-muted);stroke-width:2;transition:stroke .13s;}\n.sb-item>span:first-of-type{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.sb-item:hover svg{stroke:var(--text-secondary);}\n.sb-item .ro{margin-left:auto;font-size:9px;font-weight:700;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:var(--radius-pill);letter-spacing:.3px;}\n.sb-item.active .ro{background:var(--card);}\n.sb-item .ct{margin-left:auto;min-width:17px;height:17px;padding:0 4px;border-radius:var( en .dot{background:var(--primary);}\n.badge-red{background:var(--red-light);color:var(--red);}.badge-red .dot{background:var(--red);}\n.badge-amber{background:var(--amber-light);color:var(--amber);}.badge-amber .dot{background:var(--amber);}\n.badge-blue{background:var(--blue-light);color:var(--blue);}.badge-blue .dot{background:var(--blue);}\n.badge-violet{background:var(--violet-light);color:var(--violet);}.badge-violet .dot{background:var(--violet);}\n.badge-cyan{background:var(--cyan-light);color:var(--cyan);}.badge-cyan .dot{background:var(--cyan);}\n.badge-gray{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border);}.badge-gray .dot{background:var(--text-muted);}\n\n.pill{display:inline-flex;align-items:center;gap:6px;background:var(--pill);color:#fff;border-radius:var(--radius-pill);padding:3px 10px;font-size:11px;font-weight:600;}\n.pill .dose{opacity:.65;font-family:var(--mono);font-size:10px;}\n\n/* ───────── Cards ───────── */\n.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transition:box-shadow .2s cubic-bezier(.4,0,.2,1),border-color .2s cubic-bezier(.4,0,.2,1);}\n.card-pad{padding:18px;}\n.card:hover{box-shadow:var(--shadow-md);border-color:#D1D9E0;}\n.card-flat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}\n.card-head{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;gap:10px;}\n.card-title{font-size:10.5px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}\n.card-title svg{width:13px;height:13px;stroke:var(--text-muted);stroke-width:2;}\n\n/* ── KPI Hero — métrique principale, fond sombre ── */\n.kpi-hero{background:var(--pill);border-color:transparent;box-shadow:0 4px 20px rgba(32,59,20,.22);}\n.kpi-hero:hover{border-color:transparent;box-shadow:0 6px 24px rgba(32,59,20,. (--border);background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1);}\n.alert-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}\n.alert-card:active{transform:translateY(0);}\n.alert-card .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.alert-card .ic svg{width:19px;height:19px;stroke-width:2.2;}\n.alert-card .big{font-size:20px;font-weight:800;line-height:1;}\n.alert-card .cap{font-size:11px;color:var(--text-secondary);font-weight:600;margin-top:2px;}\n.alert-card.amber .ic{background:var(--amber-light);} .alert-card.amber .ic svg{stroke:var(--amber);} .alert-card.amber .big{color:var(--amber);}\n.alert-card.red .ic{background:var(--red-light);} .alert-card.red .ic svg{stroke:var(--red);} .alert-card.red .big{color:var(--red);}\n.alert-card.blue .ic{background:var(--blue-light);} .alert-card.blue .ic svg{stroke:var(--blue);} .alert-card.blue .big{color:var(--blue);}\n.alert-card.green .ic{background:var(--primary-light);} .alert-card.green .ic svg{stroke:var(--primary);} .alert-card.green .big{color:var(--primary);}\n\n/* ───────── Dashboard map + FAB ───────── */\n.dash{position:relative;height:calc(100vh - var(--hdr-h));}\n#dashMap{position:absolute;inset:0;z-index:1;}\n.dash-overlay{position:absolute;inset:0;z-index:5;pointer-events:none;padding:18px;display:flex;flex-direction:column;}\n.dash-overlay>*{pointer-events:auto;}\n.dash-alerts{display:flex;gap:9px;flex-wrap:wrap;max-width:760px;}\n\n/* Floating panel — verre dépoli soigné */\n.floato{\n  background:rgba(255,255,255,.94);\n  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);\n  border:1px solid rgba(255,255,255,.82);\n  border-radius:var(--radius);\n  box-shadow:0 8px 28px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.07);\n}\n\n/* FAB station */\n.fab-station{position:absolute;right:18px;top:50%;transform:translateY(-50%);z-index:6;display:flex;flex-direction:column;gap:9px;}\n.fab{position:relative;width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border:1px solid rgba(226,232,240,.9);box-shadow:0 4px 16px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1);}\n.fab:hover{transform:translateX(-3px);box-shadow:0 6px 22px rgba(0,0,0,.16);}\n.fab:active{transform:translateX(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1);}\n.fab.active{background:var(--pill);border-color:var(--pill);box-shadow:0 4px 16px rgba(32,59,20,.35);}\n.fab.active svg{stroke:#fff;}.fab.active .fab-lbl{color:rgba(255,255,255,.65);}\n.fab svg{width:20px;height:20px;stroke:var(--text-secondary);stroke-width:2;}\n.fab-lbl{font-size:7.5px;font-weight:700;color:var(--text-muted);letter-spacing:.2px;text-align:center;}\n.fab .ct{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:var(--radius-pill);font-size:10px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}\n.fab .ct.amber{background:var(--amber);}\n.fab .ct.red{background:var(--red);}\n.fab .ct.green{background:var(--primary);}\n.fab .ct.gray{background:var(--text-muted);}\n\n@keyframes fabPulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 9px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}\n.fab .ct.pulse{animation:fabPulse 2s ease-out infinite;}\n\n/* cap label magasin au-dessus des FABs */\n.fab-cap{font-size:7.5px;font-weight:800;letter-spacing:1.2px;color:rgba(255,255,255,.88);background:rgba(32,59,20,.78);backdrop-filter:blur(8px);border-radius:8px;padding:5px 0;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);}\n\n/* map parcelle label */\n.plabel{background:rgba(15,23,42,.86);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:6px 10px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.32);white-space:nowrap;}\n.plabel .pn{font-size:12px;font-weight:700;line-height:1.1;}\n.plabel .ps{font-size:10px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:5px;}\n.plabel .ps .d{width:6px;height:6px;border-radius:50%;}\n.plabel.ok .ps{color:#86EFAC;}.plabel.ok .ps .d{background:#22C55E;}\n.plabel.warn .ps{color:#FCD34D;}.plabel.warn .ps .d{background:#F59E0B;}\n.plabel.empty .ps{color:#94A3B8;}.plabel.empty .ps .d{background:#64748B;}\n\n/* map legend */\n.map-legend{position:absolute;left:18px;bottom:18px;z-index:6;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}\n.leg-pill{background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border:1px solid rgba(226,232,240,.7);border-radius:var(--radius-pill);padding:5px 11px;font-size:11px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.07);}\n.leg-pill .d{width:8px;height:8px;border-radius:2px;}\n\n/* ───────── Command panel ───────── */\n.cmd{width:338px;max-width:74vw;padding:14px 15px;}\n.cmd-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;gap:10px;}\n.cmd-kicker{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);display:flex;align-items:center;gap:7px;}\n.cmd-pulse{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:fabPulse 2.6s infinite;flex-shrink:0;}\n.cmd-date{font-size:12px;color:var(--text-secondary);font-weight:700;text-transform:capitalize;text-align:right;line-height:1.3;max-width:140px;}\n.cmd-lead{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:filter .13s,transform .13s;margin-bottom:11px;}\n.cmd-lead .cmd-lead-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.cmd-lead .cmd-lead-ic svg{width:19px;height:19px;stroke-width:2.2;}\n.cmd-lead-txt{flex:1;min-width:0;}\n.cmd-lead-txt .t{font-weight:800;font-size:13.5px;line-height:1.2;}\n.cmd-lead-txt .s{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.cmd-go svg{width:17px;height:17px;flex-shrink:0;}\n.cmd-lead:hover{filter:brightness(.97);transform:translateX(2px);}\n.cmd-lead:active{transform:translateX(0);}\n.cmd-lead.red{background:var(--red-light);} .cmd-lead.red .cmd-lead-ic{background:#fff;color:var(--red);} .cmd-lead.red .cmd-go{color:var(--red);}\n.cmd-lead.blue{background:var(--blue-light);} .cmd-lead.blue .cmd-lead-ic{background:#fff;color:var(--blue);} .cmd-lead.blue .cmd-go{color:var(--blue);}\n.cmd-lead.amber{background:var(--amber-light);} .cmd-lead.amber .cmd-lead-ic{background:#fff;color:var(--amber);} .cmd-lead.amber .cmd-go{color:var(--amber);}\n.cmd-lead.green{background:var(--primary-light);} .cmd-lead.green .cmd-lead-ic{background:#fff;color:var(--primary);} .cmd-lead.green .cmd-go{color:var(--primary);}\n\n/* Divider entre lead et stats */\n.cmd-divider{height:1px;background:rgba(226,232,240,.7);margin:0 -15px 11px;}\n\n.cmd-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}\n.cmd-stat{border:1px solid var(--border);background:var(--card);border-radius:9px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .14s cubic-bezier(.4,0,.2,1);}\n.cmd-stat:hover{background:var(--bg);border-color:var(--text-light);transform:translateY(-1px);}\n.cmd-stat:active{transform:translateY(0);}\n.cmd-stat-n{font-size:19px;font-weight:800;line-height:1;}\n.cmd-stat-n.red{color:var(--red);}.cmd-stat-n.amber{color:var(--amber);}.cmd-stat-n.blue{color:var(--blue);}.cmd-stat-n.green{color:var(--primary);}\n.cmd-stat-l{font-size:9px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:3px;white-space:nowrap;}\n.cmd-stat-l svg{width:11px;height:11px;flex-shrink:0;}\n\n/* depot marker */\n.depot{display:flex;flex-direction:column;align-items:flex-start;gap:4px;}\n.depot-pin{width:40px;height:40px;border-radius:13px 13px 13px 4px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(0,0,0,.42);border:2.5px solid #fff;}\n.depot-pin svg{width:20px;height:20px;}\n.depot-lbl{font-size:10px;font-weight:700;color:#fff;background:rgba(15,23,42,.88);border-radius:7px;padding:3px 9px;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.32);}\n\n@keyframes dashFlow{to{stroke-dashoffset:-18;}}\n.connector{animation:dashFlow .9s linear infinite;}\n\n/* ───────── Drawer ───────── */\n.drawer-scrim{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s;}\n.drawer-scrim.open{opacity:1;pointer-events:auto;}\n.drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--card);border-left:1px solid var(--border);box-shadow:-16px 0 40px rgba(0,0,0,.12);z-index:61;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}\n.drawer.open{transform:none;}\n.drawer-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;}\n.drawer-body{flex:1;overflow-y:auto;padding:16px 18px;}\n.drawer-foot{border-top:1px solid var(--border);padding:14px 18px;flex-shrink:0;background:var(--bg);}\n.x-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text-muted);transition:all .13s;}\n.x-btn:hover{background:var(--bg);color:var(--text);border-color:var(--text-light);}\n.x-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;}\n\n/* ───────── Modal ───────── */\n.modal-scrim{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:70;display:flex;align-items:center;justify-content:center;padding:28px;opacity:0;pointer-events:none;transition:opacity .2s;}\n.modal-scrim.open{opacity:1;pointer-events:auto;}\n.modal{background:var(--card);border-radius:var(--radius-lg);box-shadow:0 24px 64px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.1);width:100%;max-width:880px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(16px) scale(.985);transition:transform .22s cubic-bezier(.4,0,.2,1);overflow:hidden;}\n.modal-scrim.open .modal{transform:none;}\n.modal.sm{max-width:520px;}\n.modal.lg{max-width:1040px;}\n.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0;}\n.modal-head .mt{font-size:15.5px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:10px;}\n.modal-head .micon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.modal-head .micon svg{width:17px;height:17px;stroke-width:2.2;}\n.modal-body{flex:1;overflow-y:auto;padding:18px 20px;}\n.modal-foot{border-top:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:flex-end;gap:9px;flex-shrink:0;background:var(--bg);}\n\n/* ───────── Forms ───────── */\n.field{margin-bottom:14px;}\n.field label{display:block;font-size:10px;font-weight:700;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}\n.input,.select,.textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;font-family:inherit;color:var(--text);background:var(--bg);transition:border-color .14s,box-shadow .14s,background .14s;}\n.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.1 ow-md);border-color:#D1D9E0;}\n.prod-row{display:flex;align-items:center;gap:13px;padding:13px 15px;cursor:pointer;}\n.prod-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;}\n.prod-name{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.2;}\n.prod-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}\n.prod-qty{text-align:right;flex-shrink:0;}\n.prod-qty .q{font-size:16px;font-weight:800;letter-spacing:-.3px;}\n.prod-qty .qu{font-size:11px;color:var(--text-muted);font-weight:600;}\n\n/* gauge bar */\n.gbar{height:5px;border-radius:3px;background:var(--border-light);overflow:hidden;position:relative;}\n.gbar .fill{height:100%;border-radius:3px;transition:width .3s;}\n.gbar .thr{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text-secondary);opacity:.38;}\n\n/* expandable detail */\n.prod-detail{border-top:1px solid var(--border-light);padding:0 15px;max-height:0;overflow:hidden;transition:max-height .28s ease,padding .28s ease;}\n.prod-card.open .prod-detail{max-height:780px;padding:14px 15px;}\n.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:12.5px;}\n.kv:last-child{border-bottom:none;}\n.kv .k{color:var(--text-muted);}\n.kv .v{font-weight:600;color:var(--text);}\n\n/* movement timeline */\n.mv{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--border-light);}\n.mv:last-child{border-bottom:none;}\n.mv-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.mv-ic svg{width:13px;height:13px;stroke-width:2.2;}\n.mv-main{flex:1;min-width:0;}\n.mv-t{font-size:12.5px;font-weight:600;color:var(--text);}\n.mv-s{font-size:11px;color:var(--text-muted);margin-top:1px;}\n.mv-q{font-size:13px;font-weight:800;flex-shrink:0;font-variant-numeric:tabular-nums;}\n\n/* ───────── Empty states ───────── */\n.empty{text-align:center;padding:40px 18px;color:var(--text-muted);}\n.empty svg{width:32px;height:32px;stroke:var(--text-light);stroke-width:1.5;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}\n.empty .et{font-size:13.5px;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}\n.empty .es{font-size:12px;line-height:1.6;}\n\n/* ───────── Filter chips ───────── */\n.chips{display:flex;gap:6px;flex-wrap:wrap;}\n.chip{padding:5px 12px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .13s;display:inline-flex;align-items:center;gap:5px;}\n.chip:hover{background:var(--bg);border-color:var(--text-light);}\n.chip.active{background:var(--pill);color:#fff;border-color:var(--pill);}\n.chip .n{font-size:10px;opacity:.7;}\n\n/* segmented control */\n.seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:2px;gap:2px;}\n.seg button{border:none;background:none;padding:5px 11px;font-size:12px;font-weight:600;color:var(--text-muted);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .13s;}\n.seg button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow);}\n.seg button svg{width:13px;height:13px;stroke-width:2;}\n\n/* notices */\n.notice{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;border-radius:var(--radius);font-size:12.5px;line-height:1.5;}\n.notice svg{width:16px;height:16px;flex-shrink:0;stroke-width:2.2;margin-top:1px;}\n.notice-blue{background:var(--blue-light);color:#1E40AF;}.notice-blue svg{stroke:var(--blue);}\n.notice-amber{background:var(--amber-light);color:#92400E;}.notice-amber svg{stroke:var(--amber);}\n\n/* ───────── Alerts panel ───────── */\n.apanel{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;background:var(--card);border-left:1px solid var(--border);box-shadow:-16px 0 40px rgba(0,0,0,.12);z-index:65;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}\n.apanel.open{transform:none;}\n.alert-item{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;}\n.alert-item:hover{background:var(--bg);}\n.alert-item .ai{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.alert-item .ai svg{width:16px;height:16px;stroke-width:2.2;}\n.alert-item .at{font-size:13px;font-weight:700;color:var(--text);}\n.alert-item .as{font-size:11.5px;color:var(--text-muted);margin-top:2px;line-height:1.4;}\n.alert-item .atime{font-size:10px;color:var(--text-light);margin-top:3px;}\n\n/* ───────── Toast — animation soignée ───────── */\n@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}\n.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;}\n.toast{background:var(--pill);color:#fff;border-radius:var(--radius);padding:11px 16px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:9px;animation:toastIn .25s cubic-bezier(.4,0,.2,1);}\n.toast svg{width:16px;height:16px;stroke:var(--primary);stroke-width:2.4;flex-shrink:0;}\n\n/* ───────── Misc helpers ───────── */\n.row{display:flex;align-items:center;gap:10px;}\n.col{display:flex;flex-direction:column;}\n.between{justify-content:space-between;}\n.wrap{flex-wrap:wrap;}\n.g8{gap:8px;}.g12{gap:12px;}.g16{gap:16px;}\n.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}.mt20{margin-top:20px;}\n.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}\n\n/* toggle switch */\n.tgl{width:40px;height:23px;border-radius:var(--radius-pill);background:var(--bord
