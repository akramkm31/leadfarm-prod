<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeadFarm — Domaine Khelifa</title>
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/screens.css">
<style>
:root{
  --color-canvas-ice:#fbfdf6;
  --color-adaline-ink:#0a1d08;
  --color-mist-gray:#c5ccb6;
  --color-deep-earth:#31200b;
  --color-valley-green:#203b14;
  --color-stone-moss:#e0e5d5;
  --color-amber-seed:#4a3212;
  --color-forest-dew:#d7e8b5;
  --color-blackest-night:#000;

  /* agro accents derived from system */
  --c-sky:#a8c8d8;
  --c-warn:#7a4a1a;
  --c-danger:#6b1f0a;

  --font-sans:'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono:'Fragment Mono', ui-monospace, Menlo, Consolas, monospace;

  --text-caption:12px;
  --text-body-sm:14px;
  --text-body:18px;
  --text-body-lg:47px;
  --text-heading-sm:53px;

  --s8:8px;--s16:16px;--s24:24px;--s32:32px;--s40:40px;--s48:48px;--s64:64px;
  --r-img:8px;--r-btn:20px;--r-nav:20px;

  --shadow-subtle:rgba(99,143,61,.1) 0 0 0 1px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--color-canvas-ice);
  color:var(--color-adaline-ink);
  font-family:var(--font-sans);
  font-size:var(--text-body-sm);
  line-height:1.43;
  letter-spacing:-0.02em;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;letter-spacing:inherit}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--font-mono);letter-spacing:.04em}
.meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--color-mist-gray)}

/* ───────── App shell ───────── */
#root{height:100vh;display:grid;grid-template-columns:248px 1fr}

.sidebar{
  background:var(--color-canvas-ice);
  border-right:1px solid var(--color-stone-moss);
  display:flex;flex-direction:column;
  padding:24px 16px;
  gap:8px;
  overflow-y:auto;
}
.sb-brand{padding:8px 12px 24px;display:flex;flex-direction:column;gap:6px}
.sb-brand .word{font-size:24px;font-weight:700;letter-spacing:-0.04em;color:var(--color-adaline-ink);display:flex;align-items:center;gap:8px}
.sb-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--color-valley-green);box-shadow:0 0 0 4px rgba(32,59,20,.12)}
.sb-brand .sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--color-mist-gray)}

.sb-tenant{
  margin:4px 0 16px;
  border:1px solid var(--color-stone-moss);
  border-radius:var(--r-img);
  padding:12px 14px;
  display:flex;flex-direction:column;gap:6px;
  background:linear-gradient(180deg,var(--color-canvas-ice),#f5f8ec);
}
.sb-tenant .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--color-mist-gray)}
.sb-tenant .nm{font-size:14px;font-weight:600;letter-spacing:-0.03em;color:var(--color-adaline-ink)}
.sb-tenant .loc{font-family:var(--font-mono);font-size:10px;color:var(--color-valley-green);letter-spacing:.06em}

.sb-group-label{padding:16px 12px 6px;font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--color-mist-gray)}

.sb-link{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;
  border-radius:var(--r-nav);
  font-size:14px;letter-spacing:-0.03em;
  color:var(--color-adaline-ink);
  position:relative;
  cursor:pointer;
}
.sb-link:hover{background:#f1f5e6}
.sb-link.active{background:var(--color-forest-dew);color:var(--color-valley-green);font-weight:500}
.sb-link svg{width:16px;height:16px;flex-shrink:0;stroke-width:1.6}
.sb-link .badge{
  margin-left:auto;
  font-family:var(--font-mono);
  font-size:10px;letter-spacing:.04em;
  background:var(--color-amber-seed);color:var(--color-canvas-ice);
  padding:2px 7px;border-radius:10px;
}
.sb-link.active .badge{background:var(--color-valley-green)}

.sb-user{
  margin-top:auto;
  border-top:1px solid var(--color-stone-moss);
  padding-top:16px;
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--color-amber-seed);color:var(--color-canvas-ice);display:grid;place-items:center;font-size:12px;font-weight:600;letter-spacing:.04em}
.sb-user .nm{font-size:13px;letter-spacing:-0.02em}
.sb-user .ro{font-family:var(--font-mono);font-size:10px;color:var(--color-mist-gray);letter-spacing:.06em}

/* ───────── Main ───────── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--color-canvas-ice)}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  border-bottom:1px solid var(--color-stone-moss);
  background:var(--color-canvas-ice);
  gap:24px;
  flex-shrink:0;
}
.crumbs{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-mist-gray)}
.crumbs .now{color:var(--color-adaline-ink)}
.topbar-right{display:flex;align-items:center;gap:12px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:36px;padding:0 18px;border-radius:var(--r-btn);
  font-size:13px;font-weight:400;letter-spacing:-0.03em;
  transition:all .15s;
}
.btn svg{width:14px;height:14px;stroke-width:1.6}
.btn-primary{background:var(--color-amber-seed);color:var(--color-canvas-ice)}
.btn-primary:hover{background:#3a280e}
.btn-secondary{background:var(--color-canvas-ice);color:var(--color-adaline-ink);border:1px solid var(--color-adaline-ink)}
.btn-tertiary{background:var(--color-canvas-ice);color:var(--color-valley-green);border:1px solid var(--color-stone-moss)}
.btn-tertiary:hover{border-color:var(--color-valley-green)}
.btn-ghost{color:var(--color-adaline-ink);padding:0 12px}
.btn-ghost:hover{background:#f1f5e6}

.live-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:20px;
  background:var(--color-canvas-ice);
  border:1px solid var(--color-stone-moss);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--color-valley-green);
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#3d8b3d;box-shadow:0 0 0 3px rgba(61,139,61,.18);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}

/* ───────── scrollable content ───────── */
.content{flex:1;overflow:auto;position:relative}

/* utility */
.card{background:var(--color-canvas-ice);border:1px solid var(--color-mist-gray);border-radius:var(--r-img);padding:24px}
.card-soft{background:var(--color-canvas-ice);border:1px solid var(--color-stone-moss);border-radius:var(--r-img);padding:24px}

/* hide scrollbar but allow scroll */
.scroll-y{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--color-mist-gray) transparent}
.scroll-y::-webkit-scrollbar{width:6px}
.scroll-y::-webkit-scrollbar-thumb{background:var(--color-mist-gray);border-radius:3px}

/* fades in on screen mount */
.screen{animation:scrnIn .35s ease}
@keyframes scrnIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

</style>
</head>
